name: Deploy HOMER.io

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: homer
          POSTGRES_PASSWORD: homer
          POSTGRES_DB: homer
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run -w @homer-io/shared build
      - run: npx turbo build
      - run: npx turbo test
        env:
          DATABASE_URL: postgresql://homer:homer@localhost:5432/homer
          REDIS_URL: redis://localhost:6379

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to ovh2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH2_HOST }}
          username: ${{ secrets.OVH2_USER }}
          key: ${{ secrets.OVH2_KEY }}
          script: |
            cd /opt/homer-io
            git pull origin main
            npm ci
            npx turbo build
            npx drizzle-kit migrate --config packages/api/drizzle.config.ts
            pm2 reload ecosystem.config.cjs
            curl -sf http://localhost:5000/ > /dev/null && echo "OSRM: healthy" || echo "OSRM: not running (routing will use haversine fallback)"
            echo "Deployed $(git rev-parse --short HEAD) at $(date)"
