name: Deploy HOMER.io

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: homer
          POSTGRES_PASSWORD: homer
          POSTGRES_DB: homer
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Port drift guard (Finding H14) — fail fast before anything else runs
      - name: Verify infra port consistency
        run: node scripts/verify-port-consistency.mjs

      # Shared is a workspace dep consumed by api/web/worker/mobile, so its
      # dist must exist before typecheck / lint can resolve `@homer-io/shared`.
      - run: npm run -w @homer-io/shared build

      - name: Lint
        run: npx turbo lint

      - name: Typecheck
        run: npx turbo typecheck

      - name: Test
        run: npx turbo test
        env:
          DATABASE_URL: postgresql://homer:homer@localhost:5432/homer
          REDIS_URL: redis://localhost:6379

      # Security audit (Finding H16). Audit is now clean (0 vulns) so we fail
      # on any new vulnerability of moderate severity or higher.
      - name: Security audit
        run: npm audit --audit-level=moderate

      # Preservation check: the original HOMER.io demo prototype lives at
      # legacy/demo-site/ and must remain intact for historical reference.
      # We do NOT build or deploy it — the active /demo experience is served
      # from packages/web. This step fails CI if someone accidentally removes
      # or renames the core files.
      - name: Verify legacy demo-site preserved
        run: |
          set -e
          for f in legacy/demo-site/index.html \
                   legacy/demo-site/main.jsx \
                   legacy/demo-site/App.jsx \
                   legacy/demo-site/vite.config.js; do
            if [ ! -f "$f" ]; then
              echo "::error::Legacy demo file missing: $f"
              exit 1
            fi
          done
          echo "Legacy demo-site preservation check OK."

      - name: Build
        run: npx turbo build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to ovh2 via SSH
        id: ssh_deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH2_HOST }}
          username: ${{ secrets.OVH2_USER }}
          key: ${{ secrets.OVH2_KEY }}
          port: 41022
          command_timeout: 8m
          script: |
            cd /opt/homer-io
            git fetch origin
            git pull --ff-only origin main
            npm ci
            npx turbo build
            rsync -a --delete packages/web/dist/ site/
            # Finding H17: use versioned migrations instead of `drizzle-kit push --force`.
            # db:migrate:run applies committed SQL files in packages/api/drizzle/ in order.
            # Fails the deploy step on migration error so we don't ship schema drift.
            npm run -w @homer-io/api db:migrate:run
            pm2 reload infra/ecosystem.config.cjs || pm2 start infra/ecosystem.config.cjs
            if curl -sf http://localhost:5000/ > /dev/null 2>&1; then
              echo "OSRM: healthy"
            else
              echo "OSRM: not running — attempting restart..."
              docker start osrm-homer 2>/dev/null && sleep 3 && curl -sf http://localhost:5000/ > /dev/null && echo "OSRM: restarted successfully" || echo "OSRM: still down (run infra/osrm/setup-osrm.sh to initialize). Routing will use haversine fallback."
            fi
            echo "Deployed $(git rev-parse --short HEAD) at $(date)"

      - name: Reboot ovh2 via OVH API (SSH failed)
        if: steps.ssh_deploy.outcome == 'failure'
        env:
          OVH_APP_KEY: ${{ secrets.OVH_APP_KEY }}
          OVH_APP_SECRET: ${{ secrets.OVH_APP_SECRET }}
          OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
        run: |
          echo "::warning::SSH deploy failed — rebooting ovh2 via OVH API"
          VPS="vps-05030f8b.vps.ovh.us"
          API="https://api.us.ovhcloud.com/1.0"
          TSTAMP=$(curl -s "${API}/auth/time")
          URL="${API}/vps/${VPS}/reboot"
          SIG="\$1\$$(echo -n "${OVH_APP_SECRET}+${OVH_CONSUMER_KEY}+POST+${URL}++${TSTAMP}" | sha1sum | cut -d' ' -f1)"
          RESULT=$(curl -s -X POST \
            -H "X-Ovh-Application: ${OVH_APP_KEY}" \
            -H "X-Ovh-Timestamp: ${TSTAMP}" \
            -H "X-Ovh-Signature: ${SIG}" \
            -H "X-Ovh-Consumer: ${OVH_CONSUMER_KEY}" \
            -H "Content-Type: application/json" \
            "${URL}")
          echo "OVH reboot response: $RESULT"
          echo "Waiting 90s for server to come back..."
          sleep 90

      - name: Retry deploy after reboot
        if: steps.ssh_deploy.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH2_HOST }}
          username: ${{ secrets.OVH2_USER }}
          key: ${{ secrets.OVH2_KEY }}
          port: 41022
          command_timeout: 8m
          script: |
            cd /opt/homer-io
            git fetch origin
            git pull --ff-only origin main
            npm ci
            npx turbo build
            rsync -a --delete packages/web/dist/ site/
            # Finding H17: use versioned migrations instead of `drizzle-kit push --force`.
            npm run -w @homer-io/api db:migrate:run
            pm2 reload infra/ecosystem.config.cjs || pm2 start infra/ecosystem.config.cjs
            if curl -sf http://localhost:5000/ > /dev/null 2>&1; then
              echo "OSRM: healthy"
            else
              echo "OSRM: not running — attempting restart..."
              docker start osrm-homer 2>/dev/null && sleep 3 && curl -sf http://localhost:5000/ > /dev/null && echo "OSRM: restarted successfully" || echo "OSRM: still down (run infra/osrm/setup-osrm.sh to initialize). Routing will use haversine fallback."
            fi
            echo "Deployed $(git rev-parse --short HEAD) at $(date) (after reboot)"
