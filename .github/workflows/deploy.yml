name: Deploy HOMER.io

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: homer
          POSTGRES_PASSWORD: homer
          POSTGRES_DB: homer
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run -w @homer-io/shared build
      - run: npx turbo build
      - run: npx turbo test
        env:
          DATABASE_URL: postgresql://homer:homer@localhost:5432/homer
          REDIS_URL: redis://localhost:6379

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to ovh2 via SSH
        id: ssh_deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH2_HOST }}
          username: ${{ secrets.OVH2_USER }}
          key: ${{ secrets.OVH2_KEY }}
          command_timeout: 8m
          script: |
            cd /opt/homer-io
            git fetch origin
            git pull --ff-only origin main
            npm ci
            npx turbo build
            rsync -a --delete packages/web/dist/ site/
            echo 'n' | npx drizzle-kit push --config infra/drizzle-push.config.ts --force || echo 'drizzle push skipped'
            pm2 reload infra/ecosystem.config.cjs || pm2 start infra/ecosystem.config.cjs
            curl -sf http://localhost:5000/ > /dev/null && echo "OSRM: healthy" || echo "OSRM: not running (routing will use haversine fallback)"
            echo "Deployed $(git rev-parse --short HEAD) at $(date)"

      - name: Reboot ovh2 via OVH API (SSH failed)
        if: steps.ssh_deploy.outcome == 'failure'
        env:
          OVH_APP_KEY: ${{ secrets.OVH_APP_KEY }}
          OVH_APP_SECRET: ${{ secrets.OVH_APP_SECRET }}
          OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
        run: |
          echo "::warning::SSH deploy failed — rebooting ovh2 via OVH API"
          VPS="vps-05030f8b.vps.ovh.us"
          API="https://api.us.ovhcloud.com/1.0"
          TSTAMP=$(curl -s "${API}/auth/time")
          URL="${API}/vps/${VPS}/reboot"
          SIG="\$1\$$(echo -n "${OVH_APP_SECRET}+${OVH_CONSUMER_KEY}+POST+${URL}++${TSTAMP}" | sha1sum | cut -d' ' -f1)"
          RESULT=$(curl -s -X POST \
            -H "X-Ovh-Application: ${OVH_APP_KEY}" \
            -H "X-Ovh-Timestamp: ${TSTAMP}" \
            -H "X-Ovh-Signature: ${SIG}" \
            -H "X-Ovh-Consumer: ${OVH_CONSUMER_KEY}" \
            -H "Content-Type: application/json" \
            "${URL}")
          echo "OVH reboot response: $RESULT"
          echo "Waiting 90s for server to come back..."
          sleep 90

      - name: Retry deploy after reboot
        if: steps.ssh_deploy.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH2_HOST }}
          username: ${{ secrets.OVH2_USER }}
          key: ${{ secrets.OVH2_KEY }}
          command_timeout: 8m
          script: |
            cd /opt/homer-io
            git fetch origin
            git pull --ff-only origin main
            npm ci
            npx turbo build
            rsync -a --delete packages/web/dist/ site/
            echo 'n' | npx drizzle-kit push --config infra/drizzle-push.config.ts --force || echo 'drizzle push skipped'
            pm2 reload infra/ecosystem.config.cjs || pm2 start infra/ecosystem.config.cjs
            echo "Deployed $(git rev-parse --short HEAD) at $(date) (after reboot)"
