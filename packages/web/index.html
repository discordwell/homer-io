<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <!--
      Content Security Policy. This header can also be set by Caddy (see
      infra/Caddyfile); the meta tag below is the primary source of truth so
      local `vite preview` + static hosting get the same protection.

      Origins allowed and why:
      - Google OAuth (accounts.google.com / apis.google.com / gstatic): sign-in button
      - Google Fonts + Fontshare: typography (preconnected above)
      - MapTiler (api.maptiler.com): hero map tiles/fonts/sprites via MapLibre
      - Carto basemaps (basemaps.cartocdn.com): Leaflet dark tiles on app maps
      - OpenStreetMap tile CDN: fallback tiles for MapLibre/Leaflet
      - https: broadly on img-src: allows MinIO presigned URLs for POD photos
        whose host varies per deployment
      - wss: + https: on connect-src: Socket.IO fleet namespace + API calls.
        Same-origin covers the default Caddy proxy topology; the wildcards
        cover app.homer.io / api.homer.io / custom deployments without having
        to regenerate HTML per-env.
      No `unsafe-eval` — avoid security regression.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://accounts.google.com https://apis.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com https://*.gstatic.com; font-src 'self' data: https://fonts.gstatic.com https://api.fontshare.com https://cdn.fontshare.com https://api.maptiler.com; img-src 'self' data: blob: https:; worker-src 'self' blob:; media-src 'self' blob:; connect-src 'self' https: wss: ws:; frame-src https://accounts.google.com https://*.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
